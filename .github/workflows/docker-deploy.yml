name: Docker CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest

            docker stop laravel-container || true
            docker rm laravel-container || true

            docker run -d -p 80:8000 --name laravel-container ${{ secrets.DOCKER_USERNAME }}/laravel-app:latest